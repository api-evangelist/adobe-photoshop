specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Adobe Photoshop
providerId: adobe-photoshop
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Photo
  - Image Editing
  - Generative AI
notes: >-
  Photoshop desktop has no public REST API (scripting is local via UXP /
  ExtendScript). Rate limits apply only to the Firefly Services Photoshop
  APIs (generative fill, expand, remove background, smart object replace).
  Numeric per-second / per-minute ceilings are not published publicly and
  vary per endpoint.
description: >-
  Server-side rate limits for Photoshop-related APIs apply to the Firefly
  Services Photoshop endpoints. Limits are governed by per-account
  concurrency caps and the generative-credit balance; sustained excess
  returns 429.
sources:
  - https://developer.adobe.com/firefly-services/docs/photoshop/
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Firefly Photoshop API (generative fill / expand / remove)
    scope: account
    metric: requests_per_minute
    limit: see https://developer.adobe.com/firefly-services/docs/photoshop/
    notes: >-
      Per-account throttle on the server-side image manipulation endpoints;
      concurrent generation slots vary per Firefly Services plan.
  - name: Photoshop API async jobs
    scope: account
    metric: concurrent_jobs
    limit: see https://developer.adobe.com/firefly-services/docs/photoshop/
    notes: >-
      Long-running operations (high-resolution renders, batch jobs)
      submit asynchronously; concurrency is gated per account.
policies:
  - name: Backoff Strategy
    description: Exponential backoff with jitter; honor Retry-After when present.
  - name: Async-job pattern
    description: >-
      Submit long-running renders as async jobs and poll the status
      endpoint; do not retry the create-job call to avoid duplicate work.
  - name: Generative-credit pacing
    description: >-
      Calls decrement the generative-credit balance; depleted balance
      returns a billing-state error rather than 429.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
