naftiko: 1.0.0-alpha2
info:
  label: Adobe Photoshop API
  description: A cloud-based REST API that provides programmatic access to Photoshop's image editing capabilities without
    requiring a local installation. Part of Adobe Firefly Services, the API supports PSD document operations including layer
    editing, Smart Object replacement, text layer editing, rendition creation, and artboard management. It also provides AI-powered
    features such as background removal, mask creation, product crop, and depth blur. All operations are asynchronous, returning
    a polling URL to check job status.
  tags:
  - Adobe
  - Photoshop
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
