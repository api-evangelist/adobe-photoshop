naftiko: 1.0.0-alpha2
info:
  label: Adobe Photoshop API — Health
  description: 'Adobe Photoshop API — Health. 1 operations. Lead operation: Adobe Photoshop Service Health Check. Self-contained
    Naftiko capability covering one Adobe Photoshop business surface.'
  tags:
  - Adobe Photoshop
  - Health
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADOBE_PHOTOSHOP_API_KEY: ADOBE_PHOTOSHOP_API_KEY
capability:
  consumes:
  - type: http
    namespace: adobe-photoshop-health
    baseUri: https://image.adobe.io
    description: Adobe Photoshop API — Health business capability. Self-contained, no shared references.
    resources:
    - name: pie-psdService-hello
      path: /pie/psdService/hello
      operations:
      - name: healthcheck
        method: GET
        description: Adobe Photoshop Service Health Check
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ADOBE_PHOTOSHOP_API_KEY}}'
  exposes:
  - type: rest
    namespace: adobe-photoshop-health-rest
    port: 8080
    description: REST adapter for Adobe Photoshop API — Health. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/pie/psdservice/hello
      name: pie-psdservice-hello
      description: REST surface for pie-psdService-hello.
      operations:
      - method: GET
        name: healthcheck
        description: Adobe Photoshop Service Health Check
        call: adobe-photoshop-health.healthcheck
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: adobe-photoshop-health-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adobe Photoshop API — Health. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: adobe-photoshop-service-health-check
      description: Adobe Photoshop Service Health Check
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: adobe-photoshop-health.healthcheck
      outputParameters:
      - type: object
        mapping: $.
