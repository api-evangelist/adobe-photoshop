specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Adobe Photoshop
providerId: adobe-photoshop
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Photo
  - Image Editing
  - Generative AI
notes: >-
  Photoshop is per-seat SaaS (Photography, Single App, or All Apps) plus
  optional generative-credit usage for Firefly Photoshop APIs. Public
  list prices were not retrievable via WebFetch.
description: >-
  FOCUS-aligned FinOps shape for Adobe Photoshop: per-seat Creative Cloud
  subscription (Photography, Single App, or All Apps) plus generative-credit
  metering for Firefly Photoshop server-side APIs.
sources:
  - https://www.adobe.com/products/photoshop/plans.html
  - https://developer.adobe.com/firefly-services/docs/photoshop/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Adobe Inc.
serviceCategory: Creative SaaS
billingModel:
  pricingCategory: Subscription + Generative Credits
  billingFrequency: Monthly / Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Tax
    - Refund
focusColumns:
  ServiceName: Adobe Photoshop
  ServiceCategory: Creative SaaS
  ProviderName: Adobe
  PublisherName: Adobe Inc.
  InvoiceIssuerName: Adobe Inc.
  BillingCurrency: USD
meters:
  - name: photoshop_seat
    description: Per-seat Photoshop subscription (Photography, Single App, or All Apps)
    unit: seat-month
    aggregation: sum
    dimensions:
      - sku
      - geography
  - name: photoshop_generative_credits
    description: Firefly Photoshop API generative-credit consumption
    unit: credit
    aggregation: sum
    dimensions:
      - api
      - account
  - name: cloud_storage
    description: Cloud storage consumed per Photoshop seat (included; tracked for capacity)
    unit: GB-month
    aggregation: max
    dimensions:
      - seat
principles:
  - name: Visibility
    description: >-
      Use the Adobe Admin Console for seat usage; Firefly Services
      dashboard for generative-credit burn against Photoshop API.
  - name: Allocation
    description: >-
      Tag seats with department metadata in the Admin Console; attribute
      Photoshop API calls to consuming team via API key per integration.
  - name: Optimization
    description: >-
      Right-size between Photography (cheapest), Single App, and All Apps
      based on actual usage; cache server-side render outputs;
      reserve high-credit calls (high-resolution generative fill) for
      final assets and use lower-resolution drafts for iteration.
  - name: Accountability
    description: >-
      Design / creative team owner accountable for active seat count;
      engineering owner accountable for Firefly Photoshop API credit burn.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
