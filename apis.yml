    type: Documentation
  - url: https://github.com/Firefly-Services/firefly-services-sdk-js
    type: GitHubRepository
  - url: https://www.npmjs.com/package/@adobe/photoshop-apis
    type: NPMPackage
  description: A unified Node.js and TypeScript SDK that provides typed client libraries
    for accessing the Photoshop API and other Firefly Services. The PhotoshopClient
    class offers methods for background removal, mask creation, PSD rendition generation,
    document creation and modification, Smart Object replacement, text layer editing,
    Photoshop Actions execution, auto crop, and depth blur.
