- type: Features
  data:
  - name: Cloud Image Processing
    description: Process images in the cloud without local Photoshop installation
      via the REST API.
  - name: Background Removal
    description: AI-powered automatic background removal and mask generation.
  - name: PSD Document Editing
    description: Create, read, and modify PSD files including layers, Smart Objects,
      and text.
  - name: Generative Fill
    description: AI-powered content generation to fill, extend, or replace image regions.
  - name: Smart Object Replacement
    description: Replace embedded Smart Object content across PSD templates programmatically.
  - name: Text Layer Editing
    description: Modify text content, fonts, colors, and styling in PSD text layers.
  - name: Photoshop Actions Execution
    description: Run recorded Photoshop Actions (.atn files) on images in the cloud.
  - name: UXP Plugin Framework
    description: Build desktop plugins with modern JavaScript, HTML, CSS, and Spectrum
      UI components.
  - name: C++ Plugin SDK
    description: Create native filters, file format support, and selection tools with
      the C++ SDK.
  - name: ExtendScript Automation
    description: Legacy scripting interface for batch processing and workflow automation.
  - name: Product Crop
    description: AI-powered automatic cropping to isolate product subjects.
  - name: Depth Blur
    description: Apply realistic depth-of-field blur effects using AI depth estimation.
- type: UseCases
  data:
  - name: Product Photography Automation
    description: Automate background removal, product crop, and image enhancement
      for e-commerce catalogs.
  - name: Template-Based Design Generation
    description: Replace Smart Objects in PSD templates to generate personalized marketing
      materials at scale.
  - name: Batch Image Processing
    description: Process thousands of images with consistent edits using the cloud
      API or Actions.
  - name: Creative Workflow Plugins
    description: Build UXP plugins that add custom panels, automate tasks, and integrate
      with external services.
  - name: Image Format Conversion
    description: Convert between PSD, JPEG, PNG, TIFF, and other formats programmatically.
  - name: Content-Aware Editing
    description: Use generative fill and AI features to extend, modify, or enhance
      image content.
  - name: Print Production Automation
    description: Automate print-ready output generation with proper color spaces and
      bleed settings.
  - name: DAM Integration
    description: Connect digital asset management systems with Photoshop for automated
      processing pipelines.
- type: Integrations
  data:
  - name: Adobe Creative Cloud
    description: Native integration with other Creative Cloud apps via shared libraries
      and cloud storage.
  - name: Adobe Lightroom
    description: Roundtrip editing between Lightroom and Photoshop for photography
      workflows.
  - name: Adobe Firefly
    description: Generative AI features powered by Adobe Firefly for content creation.
  - name: Cloud Storage Providers
    description: API supports input/output from AWS S3, Azure Blob, Google Cloud Storage,
      and Dropbox.
- type: Solutions
  data:
  - name: Photoshop API (Firefly Services)
    description: Cloud-based REST API for programmatic image processing at scale.
  - name: Photoshop Desktop (UXP)
    description: Modern plugin platform for extending Photoshop with JavaScript and
      HTML.
  - name: Photoshop Desktop (C++ SDK)
    description: Native plugin SDK for filters, file formats, and performance-critical
      extensions.
  - name: Photoshop Scripting
    description: Automation via UXP scripts (.psjs) or legacy ExtendScript (.jsx).
