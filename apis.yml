aid: adobe-photoshop
name: Adobe Photoshop
description: Adobe Photoshop is the industry-standard image editing and digital design
  application. Its developer platform offers a cloud-based REST API for programmatic
  image processing via Firefly Services, the UXP plugin framework for building desktop
  extensions with modern JavaScript, a C++ plugin SDK for native filters and file
  formats, and scripting interfaces for workflow automation.
