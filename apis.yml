    type: GettingStarted
  description: A cloud-based REST API that provides programmatic access to Photoshop's
    image editing capabilities without requiring a local installation. Part of Adobe
    Firefly Services, the API supports PSD document operations including layer editing,
    Smart Object replacement, text layer editing, and artboard creation. It also provides
    AI-powered features such as background removal, mask creation, product crop, and
    depth blur.
- aid: adobe-photoshop:firefly-services-sdk
  name: Adobe Firefly Services SDK for JavaScript
  tags:
  - Client Library
  - Node.js
  - NPM
  - SDK
  - TypeScript
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  baseURL: https://image.adobe.io
  humanURL: https://developer.adobe.com/firefly-services/docs/guides/sdks/
