  https://raw.githubusercontent.com/api-evangelist/adobe-photoshop/refs/heads/main/apis.yml
tags:
  - Image Editing
  - Creative Cloud
  - Photoshop
  - REST API
  - Plugins
  - Scripting
  - AI/ML
